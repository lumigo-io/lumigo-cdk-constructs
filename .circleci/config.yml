version: 2.1

workflows:
  update-layers:
    triggers:
    - schedule:
        cron: "0 0,4,8,12,16,20 * * *"
        filters:
          branches:
            only:
            - main
    jobs:
    - update-layers: {}

jobs:
  update-layers:
    docker:
      - image: cimg/node:18.12
        auth:
          username: lumigo
          password: $DOCKERHUB_PASSWORD
    steps:
      - checkout
      - run:
          name: 'Install depedencies for generate-layer-version-files'
          working_directory: scripts/generate-layer-version-files
          command: yarn install
      - run:
          name: 'Generate Node.js layers file'
          working_directory: scripts/generate-layer-version-files
          command: npm run lumigo-node-layer > ../../src/lambda_layers_nodejs.json
      - run:
          name: 'Generate Python layers file'
          working_directory: scripts/generate-layer-version-files
          command: npm run lumigo-python-layer > ../../src/lambda_layers_python.json
      - run:
          name: 'Push commit'
          command: |
            git config --global user.email "no-reply@build.com"
            git config --global user.name "CircleCI"
            (git commit -am "Update latest layers" && git push origin ${CIRCLE_BRANCH}) || true